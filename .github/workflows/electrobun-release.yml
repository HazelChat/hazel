name: Electrobun Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example: v0.1.7)"
        required: true
        type: string

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: macos-arm64
            runner: macos-14
          - id: macos-x64
            runner: macos-13
          - id: win-x64
            runner: windows-latest

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build desktop artifacts (stable)
        env:
          ELECTROBUN_DEVELOPER_ID: ${{ secrets.ELECTROBUN_DEVELOPER_ID }}
          ELECTROBUN_APPLEID: ${{ secrets.ELECTROBUN_APPLEID }}
          ELECTROBUN_APPLEIDPASS: ${{ secrets.ELECTROBUN_APPLEIDPASS }}
          ELECTROBUN_TEAMID: ${{ secrets.ELECTROBUN_TEAMID }}
          VITE_BACKEND_URL: ${{ vars.VITE_BACKEND_URL }}
          VITE_CLUSTER_URL: ${{ vars.VITE_CLUSTER_URL }}
          VITE_ELECTRIC_URL: ${{ vars.VITE_ELECTRIC_URL }}
          VITE_WORKOS_CLIENT_ID: ${{ vars.VITE_WORKOS_CLIENT_ID }}
          VITE_R2_PUBLIC_URL: ${{ vars.VITE_R2_PUBLIC_URL }}
        run: bun run --cwd apps/desktop build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electrobun-${{ matrix.id }}
          path: apps/desktop/artifacts/stable-*
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: electrobun-*
          path: release-assets
          merge-multiple: true

      - name: Resolve release tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: Hazel ${{ steps.release_tag.outputs.tag }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: release-assets/*
